<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .liquid-glass {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        .mesh-gradient {
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, rgba(15, 0, 231, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(99, 102, 241, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(15, 0, 231, 0.05) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(99, 102, 241, 0.05) 0px, transparent 50%);
        }
        .liquid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(180deg, #f0f4ff 0%, #d9e2ff 100%);
            overflow: hidden;
        }
        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(15, 0, 231, 0.08) 0%, rgba(15, 0, 231, 0) 70%);
            filter: blur(60px);
            border-radius: 50%;
            z-index: -1;
            animation: move 30s infinite alternate;
        }
        .blob-2 {
            right: -100px;
            top: -100px;
            background: radial-gradient(circle, rgba(15, 0, 231, 0.05) 0%, rgba(15, 0, 231, 0) 70%);
        }
        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }
    </style>

<body class="bg-background font-body text-on-surface min-h-screen">
<div class="liquid-bg">
<div class="blob"></div>
<div class="blob blob-2"></div>
</div>
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/40 backdrop-blur-md border-b border-white/30 flex items-center justify-between px-6 h-14">
<div class="flex items-center gap-4">
<button class="text-primary active:scale-95 duration-200" onclick="history.back()">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline font-bold text-lg tracking-tight text-on-surface">Pro Registration</h1>
</div>
<div class="text-primary font-black tracking-tighter">
            LP.
        </div>
</header>
<main class="pt-20 px-6 max-w-lg mx-auto">
<!-- Refined Progress Section based on SCREEN_174 -->
<section class="mb-8">
<div class="flex flex-row items-center justify-center gap-2 py-2 bg-transparent">
<div class="h-2 w-10 rounded-full bg-primary"></div>
<div class="h-1.5 w-1.5 rounded-full bg-slate-300"></div>
<div class="h-1.5 w-1.5 rounded-full bg-slate-300"></div>
</div>
<p class="text-center font-bold uppercase tracking-[0.15em] text-primary opacity-60 text-[9px] mt-1">
                HATUA YA 1 KATI YA 3
            </p>
</section>
<!-- Registration Card (Liquid Glass) -->
<div class="liquid-glass p-8 rounded-[2.5rem] shadow-2xl shadow-primary/5">
<h2 class="text-2xl font-headline font-bold mb-8 text-on-surface tracking-tight text-center">Jisajili kama Mtaalamu</h2>
<form class="space-y-6">
<!-- Full Name -->
<div class="space-y-2">
<label class="block font-label text-[10px] font-bold uppercase tracking-widest text-on-surface-variant ml-1">Jina Kamili</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg" data-icon="person">person</span>
<input class="w-full bg-white/50 border-none ring-1 ring-white/60 rounded-2xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-primary focus:bg-white transition-all text-sm outline-none" placeholder="Mf. Juma Haruna" type="text"/>
</div>
</div>
<!-- Email/Phone -->
<div class="space-y-2">
<label class="block font-label text-[10px] font-bold uppercase tracking-widest text-on-surface-variant ml-1">Barua Pepe au Simu</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg" data-icon="contact_mail">contact_mail</span>
<input class="w-full bg-white/50 border-none ring-1 ring-white/60 rounded-2xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-primary focus:bg-white transition-all text-sm outline-none" placeholder="barua@pepe.com au 07..." type="text"/>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="block font-label text-[10px] font-bold uppercase tracking-widest text-on-surface-variant ml-1">Nenosiri</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg" data-icon="lock">lock</span>
<input class="w-full bg-white/50 border-none ring-1 ring-white/60 rounded-2xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-primary focus:bg-white transition-all text-sm outline-none" placeholder="********" type="password"/>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-2">
<label class="block font-label text-[10px] font-bold uppercase tracking-widest text-on-surface-variant ml-1">Thibitisha Nenosiri</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg" data-icon="shield">shield</span>
<input class="w-full bg-white/50 border-none ring-1 ring-white/60 rounded-2xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-primary focus:bg-white transition-all text-sm outline-none" placeholder="********" type="password"/>
</div>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full bg-primary text-white font-headline font-bold h-14 rounded-2xl shadow-xl shadow-primary/25 active:scale-95 transition-transform duration-150" type="button">
                        Endelea
                    </button>
<p class="text-center mt-6 text-[12px] text-on-surface-variant">
                        Tayari una akaunti? <span class="text-primary font-bold cursor-pointer">Ingia hapa</span>
</p>
</div>
</form>
</div>
<div class="mt-12 flex justify-center">
<div class="w-24 h-24 rounded-full bg-primary/5 blur-3xl"></div>
</div>

<span class="material-symbols-outlined text-2xl mb-1" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-inter text-[10px] font-bold uppercase tracking-wider">Wasifu</span>
<div class="absolute bottom-1 w-1.5 h-1.5 bg-primary rounded-full"></div>
