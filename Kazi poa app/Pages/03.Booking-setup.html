<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#0f00e7",
              "background-light": "#f6f5f8",
              "background-dark": "#100f23",
            },
            fontFamily: {

<style>
        :root {
            --brand-blue: #0f00e7;
            --liquid-glass-bg: rgba(255, 255, 255, 0.4);
            --liquid-glass-border: rgba(255, 255, 255, 0.5);
            --liquid-glass-blur: 15px;
        }

        /* 1. Transparent Liquid Glass Panels */
        .liquid-glass-card {
            background: var(--liquid-glass-bg);
            backdrop-filter: blur(var(--liquid-glass-blur));
            -webkit-backdrop-filter: blur(var(--liquid-glass-blur));
            border: 1px solid var(--liquid-glass-border);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        /* 2. Interactive Ripple/Wave Effect for Buttons */
        .liquid-button {
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .liquid-button:active {
            transform: scale(0.96);
        }

        .liquid-button::after {
            content: "";
            display: block;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, #fff 10%, transparent 10.01%);
            background-repeat: no-repeat;
            background-position: 50%;
            transform: scale(10, 10);
            opacity: 0;
            transition: transform 0.5s, opacity 1s;
        }

        .liquid-button:active::after {
            transform: scale(0, 0);
            opacity: 0.3;
            transition: 0s;
        }

        /* 3. Fluid Background Animation */
        @keyframes fluidMotion {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .liquid-bg {
            background: linear-gradient(-45deg, #f0f4ff, #e0e7ff, #ffffff, #dbeafe);
            background-size: 400% 400%;
            animation: fluidMotion 15s ease infinite;
        }

        /* 4. Motion on Scroll (Subtle parallax/fade) */
        .motion-reveal {
            opacity: 0;
            transform: translateY(20px);
            animation: revealUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes revealUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body {
            min-height: max(884px, 100dvh);
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
