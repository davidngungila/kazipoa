<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uthibitisho Wa OTP - Kazipoa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .liquid-bg {
            background: linear-gradient(135deg, #0f00e7 0%, #7e22ce 50%, #3b82f6 100%);
            filter: blur(80px);
            opacity: 0.15;
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            z-index: -1;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass-panel {
            background: rgba(16, 15, 35, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .otp-input {
            width: 3rem;
            height: 3rem;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            border: 2px solid #e2e8f0;
            border-radius: 0.5rem;
            background: white;
            color: #1e293b;
        }
        .dark .otp-input {
            background: #1e293b;
            border-color: #334155;
            color: #f1f5f9;
        }
        .otp-input:focus {
            outline: none;
            border-color: #0f00e7;
            box-shadow: 0 0 0 3px rgba(15, 0, 231, 0.1);
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="liquid-bg"></div>
    
    <!-- Navigation -->
    <nav class="glass-panel sticky top-0 z-30 px-6 py-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <a href="01.Index.html" class="text-2xl font-bold text-primary flex items-center gap-2">
                    <span>🚀</span>
                    <span>Kazipoa</span>
                </a>
            </div>
            <div class="flex items-center gap-4">
                <button class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700" data-action="toggle-theme">
                    <span class="material-symbols-outlined">dark_mode</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto px-6 py-12">
        <div class="max-w-md mx-auto">
            <div class="glass-panel p-8 rounded-xl text-center">
                <div class="text-6xl mb-6">🔐</div>
                <h1 class="text-3xl font-bold mb-4">Ingia Nambari Ya OTP</h1>
                <p class="text-gray-600 dark:text-gray-400 mb-8">
                    Tumekutumia nambari ya OTP ya tarakimu 6 kwenye simu yako. Ingia nambari hapa chini.
                </p>

                <div class="bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-lg p-4 mb-8">
                    <p class="text-sm text-blue-800 dark:text-blue-200">
                        <strong>Namba ya simu:</strong> <span id="user-phone">+255 7xx xxx xxx</span>
                    </p>
                </div>

                <!-- OTP Input -->
                <form class="mb-8">
                    <div class="flex justify-center gap-2 mb-6">
                        <input type="text" maxlength="1" class="otp-input" data-index="0">
                        <input type="text" maxlength="1" class="otp-input" data-index="1">
                        <input type="text" maxlength="1" class="otp-input" data-index="2">
                        <input type="text" maxlength="1" class="otp-input" data-index="3">
                        <input type="text" maxlength="1" class="otp-input" data-index="4">
                        <input type="text" maxlength="1" class="otp-input" data-index="5">
                    </div>

                    <button 
                        type="submit"
                        class="w-full bg-primary text-white py-3 rounded-lg font-semibold hover:bg-primary/90 transition-all"
                    >
                        Thibitisha OTP
                    </button>
                </form>

                <div class="space-y-4">
                    <button 
                        onclick="resendOTP()"
                        class="w-full border border-primary text-primary py-3 rounded-lg font-semibold hover:bg-primary hover:text-white transition-all"
                    >
                        Tuma Upya OTP
                    </button>
                    
                    <button 
                        onclick="changePhone()"
                        class="w-full border border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-400 py-3 rounded-lg font-semibold hover:bg-gray-100 dark:hover:bg-gray-700 transition-all"
                    >
                        Badili Namba Ya Simu
                    </button>
                </div>

                <div class="mt-8 text-center">
                    <p class="text-sm text-gray-600 dark:text-gray-400 mb-2">
                        Nambari itaisha ndani ya:
                    </p>
                    <div class="text-2xl font-bold text-primary" id="timer">05:00</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="glass-panel mt-16 px-6 py-8">
        <div class="container mx-auto text-center">
            <p class="text-gray-600 dark:text-gray-400">
                © 2026 Kazipoa. Haki zote zimehifadhiwa.
            </p>
        </div>
    </footer>

    <!-- App Script -->
    <script type="module" src="../js/main.js"></script>
    <script>
        // OTP Input Logic
        const otpInputs = document.querySelectorAll('.otp-input');
        
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                const value = e.target.value;
                
                if (value.length === 1 && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
                
                // Check if all inputs are filled
                const allFilled = Array.from(otpInputs).every(inp => inp.value.length === 1);
                if (allFilled) {
                    submitOTP();
                }
            });
            
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });
            
            // Only allow numbers
            input.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
            });
        });

        // Timer Logic
        let timeLeft = 300; // 5 minutes in seconds
        const timerElement = document.getElementById('timer');
        
        function updateTimer() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            if (timeLeft > 0) {
                timeLeft--;
                setTimeout(updateTimer, 1000);
            } else {
                timerElement.textContent = 'Imechukwa';
                timerElement.classList.add('text-red-500');
            }
        }
        
        updateTimer();

        function submitOTP() {
            const otp = Array.from(otpInputs).map(input => input.value).join('');
            console.log('OTP submitted:', otp);
            
            // Simulate OTP verification
            const button = document.querySelector('form button[type="submit"]');
            button.textContent = 'Inathibitisha...';
            button.disabled = true;
            
            setTimeout(() => {
                if (otp === '123456') { // Demo OTP
                    window.location.href = '13.Dashboard.html';
                } else {
                    alert('Nambari ya OTP si sahihi. Tafadhali jaribu tena.');
                    otpInputs.forEach(input => input.value = '');
                    otpInputs[0].focus();
                    button.textContent = 'Thibitisha OTP';
                    button.disabled = false;
                }
            }, 2000);
        }

        function resendOTP() {
            const button = event.target;
            button.textContent = 'Inatumwa...';
            button.disabled = true;
            
            setTimeout(() => {
                button.textContent = 'OTP Imetumwa Upya!';
                button.classList.remove('border-primary', 'text-primary');
                button.classList.add('bg-success', 'text-white');
                
                // Reset timer
                timeLeft = 300;
                timerElement.textContent = '05:00';
                timerElement.classList.remove('text-red-500');
                
                setTimeout(() => {
                    button.textContent = 'Tuma Upya OTP';
                    button.classList.remove('bg-success', 'text-white');
                    button.classList.add('border-primary', 'text-primary');
                    button.disabled = false;
                }, 3000);
            }, 2000);
        }

        function changePhone() {
            // Go back to registration page
            window.location.href = '04.ClientID-registration.html';
        }

        // Set user phone from URL params or storage
        const urlParams = new URLSearchParams(window.location.search);
        const phone = urlParams.get('phone') || '+255 7xx xxx xxx';
        document.getElementById('user-phone').textContent = phone;

        // Handle form submission
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            submitOTP();
        });
    </script>
</body>
</html>
