name: kazipoa
description: "Kazi Poa - Service Marketplace App with Liquid Glass UI (Tanzania)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^17.2.1

  # UI & Animations
  google_fonts: ^8.0.2                  # Inter font
  material_symbols_icons: ^4.2928.1        # Material Symbols
  flutter_animate: ^4.5.0               # slideUpFade, hover-lift animations

  # Firebase (Real-time, Auth, Storage, Notifications)
  firebase_core: ^3.8.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.3.0
  shared_preferences: ^2.5.2
  firebase_messaging: ^15.1.0

  # Local Storage (Remember me / device ID)
  flutter_secure_storage: ^10.0.0

  # Image & Network
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Maps & Location (for Kazi Live)
  google_maps_flutter: ^2.9.0
  geolocator: ^14.0.2

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.0
  url_launcher: ^6.3.0
  overlay_support: ^2.1.0
  
  # Video Player
  video_player: ^2.8.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.4.12

dependency_overrides:
  # Force compatible versions for transitive dependencies
  _fe_analyzer_shared: ^92.0.0
  analyzer: ^9.0.0
  meta: ^1.17.0
  package_info_plus: ^9.0.1
  package_info_plus_platform_interface: ^3.2.1
  test: ^1.30.0
  test_api: ^0.7.10
  test_core: ^0.6.16
  vector_math: ^2.2.0
  win32: ^5.15.0
  analyzer_buffer: ^0.3.0
  dart_style: ^3.1.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/service category images/
    - assets/videos.webm/